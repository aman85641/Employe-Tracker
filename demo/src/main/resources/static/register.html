<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Register · Employee Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: "#003594",
                        "primary-light": "#1b55d0",
                        secondary: "#006c49",
                        "secondary-light": "#00a86b",
                        tertiary: "#810010",
                        surface: "#f7f9fb",
                        outline: "#cbd5e1",
                        "on-surface": "#1e293b",
                        "on-surface-variant": "#475569",
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        * { transition: all 0.2s ease; }
        body { background: linear-gradient(125deg, #f2f6fc 0%, #eef2f8 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-premium { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 30px -6px rgba(0, 0, 0, 0.1); }
        input:focus { outline: none; }
    </style>
</head>
<body class="text-on-surface antialiased p-6">
    <div class="glass-premium rounded-3xl w-full max-w-md p-8 sm:p-10 relative overflow-hidden">
        <!-- decorative blobs -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/10 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-secondary/10 rounded-full blur-2xl"></div>
        
        <div class="relative z-10 text-center mb-8">
            <div class="w-14 h-14 mx-auto bg-gradient-to-br from-primary to-primary-light rounded-2xl flex items-center justify-center shadow-lg mb-4">
                <span class="material-symbols-outlined text-white text-3xl">person_add</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-primary to-primary-light bg-clip-text text-transparent">Create Account</h1>
            <p class="text-sm text-on-surface-variant mt-2">Join Employee Tracker today</p>
        </div>

        <form id="registerForm" class="relative z-10 space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Full Name</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">person</span>
                    <input type="text" id="name" required placeholder="John Doe" 
                        class="w-full bg-white/60 border border-outline/50 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition placeholder:text-outline/80">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Email Address</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">mail</span>
                    <input type="email" id="email" required placeholder="you@company.com" 
                        class="w-full bg-white/60 border border-outline/50 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition placeholder:text-outline/80">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Password</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">lock</span>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full bg-white/60 border border-outline/50 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition placeholder:text-outline/80">
                </div>
            </div>
            
            <button type="submit" id="btn-register" 
                class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-primary to-primary-light text-white font-semibold py-3.5 rounded-xl shadow-md hover:shadow-lg transition-all active:scale-[0.98] mt-2">
                <span>Create Account</span>
                <span class="material-symbols-outlined text-[18px]">how_to_reg</span>
            </button>
        </form>

        <p class="relative z-10 text-center text-sm text-on-surface-variant mt-8">
            Already have an account? <a href="login.html" class="font-semibold text-primary hover:text-primary-light transition-colors">Sign in</a>
        </p>
    </div>

    <script src="js/app.js"></script>
    <script>
        function showToast(message, isError = false) {
            const toastDiv = document.createElement('div');
            toastDiv.className = `fixed top-6 left-1/2 transform -translate-x-1/2 z-50 px-5 py-3 rounded-full shadow-lg text-sm font-medium backdrop-blur-md transition-all duration-300 ${isError ? 'bg-red-500/90 text-white' : 'bg-secondary/90 text-white'} flex items-center gap-2`;
            toastDiv.innerHTML = `<span class="material-symbols-outlined text-[18px]">${isError ? 'error' : 'done'}</span>${message}`;
            document.body.appendChild(toastDiv);
            setTimeout(() => { toastDiv.style.opacity = '0'; setTimeout(() => toastDiv.remove(), 300); }, 2800);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const btn = document.getElementById('btn-register');
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined">sync</span> Creating Account...`;
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showToast('Registration successful! Redirecting...', false);
                    setTimeout(() => window.location.href = '/login.html', 1500);
                } else {
                    showToast(data.message || 'Registration failed', true);
                    btn.innerHTML = `<span>Create Account</span><span class="material-symbols-outlined text-[18px]">how_to_reg</span>`;
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                showToast('Error connecting to server', true);
                btn.innerHTML = `<span>Create Account</span><span class="material-symbols-outlined text-[18px]">how_to_reg</span>`;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
