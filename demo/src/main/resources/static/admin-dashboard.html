<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: "#003594",
            "primary-light": "#1b55d0",
            "primary-bg": "#ecf2ff",
            secondary: "#006c49",
            "secondary-light": "#00a86b",
            tertiary: "#810010",
            surface: "#f7f9fb",
            "surface-card": "rgba(255, 255, 255, 0.92)",
            "surface-glass": "rgba(255, 255, 255, 0.75)",
            outline: "#cbd5e1",
            "on-surface": "#1e293b",
            "on-surface-variant": "#475569",
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          backdropBlur: { xs: '2px', glass: '12px' },
        }
      }
    }

    
  </script>
  <style>
    * { transition: all 0.2s ease; }
    body { background: linear-gradient(125deg, #f2f6fc 0%, #eef2f8 100%); min-height: 100vh; }
    .glass-premium { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.02); }
    .glass-nav { background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(203, 213, 225, 0.5); }
    .card-hover { transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.02); }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body class="text-on-surface antialiased">
  <nav class="glass-nav sticky top-0 z-50 transition-shadow">
    <div class="max-w-7xl mx-auto px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-tertiary to-tertiary flex items-center justify-center shadow-md">
          <span class="material-symbols-outlined text-white text-xl">admin_panel_settings</span>
        </div>
        <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-tertiary to-tertiary bg-clip-text text-transparent">Admin Dashboard</h1>
      </div>
      <div class="flex items-center gap-5">

        <!-- Notification Bell & Dropdown -->
        <div class="relative">
          <button id="notifBtn" class="relative p-2 rounded-full hover:bg-outline/20 transition-colors text-on-surface-variant hover:text-primary focus:outline-none">
            <span class="material-symbols-outlined text-[24px]">notifications</span>
            <span id="notifBadge" class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full hidden border border-white"></span>
          </button>

          <!-- Dropdown Panel -->
          <div id="notifDropdown" class="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-xl border border-outline/30 hidden flex-col z-50 transform origin-top-right transition-all">
            <div class="p-4 border-b border-outline/20 font-semibold text-on-surface text-sm">
              Notifications
            </div>
            <div id="activityFeed" class="max-h-80 overflow-y-auto flex flex-col p-2 space-y-1">
               <div class="text-center text-xs text-on-surface-variant/70 italic py-8 flex flex-col items-center gap-2">
                 <span class="material-symbols-outlined text-4xl text-outline/50">notifications_off</span>
                 No new notifications
               </div>
            </div>
            <div class="p-3 text-center border-t border-outline/20">
              <a href="#" class="text-xs font-semibold text-primary hover:text-primary-light transition-colors">View all notifications</a>
            </div>
          </div>
        </div>

        <div class="text-right hidden sm:block">
          <p class="text-xs text-tertiary/80 font-medium">Welcome</p>
          <p class="font-semibold text-sm text-on-surface" id="username-display">Administrator</p>
        </div>
        <button id="logoutBtn" onclick="logout()" class="group flex items-center gap-2 bg-white/60 border border-outline/50 hover:bg-tertiary/10 hover:border-tertiary/30 px-5 py-2.5 rounded-full text-sm font-medium text-tertiary transition-all hover:shadow-sm">
          <span class="material-symbols-outlined text-[18px]">logout</span>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 lg:px-8 py-8 lg:py-12 space-y-10">



    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="glass-premium rounded-2xl flex flex-col overflow-hidden card-hover">
        <div class="p-6 border-b border-outline/30 flex justify-between items-center bg-white/30">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">groups</span>
            <h3 class="text-lg font-semibold">All Employees</h3>
          </div>
        </div>
        <div class="overflow-x-auto max-h-[400px]">
          <table class="min-w-full text-sm">
            <thead class="bg-surface/20 text-on-surface-variant/80 border-b border-outline/20">
              <tr>
                <th class="px-6 py-4 text-left font-semibold tracking-wider">ID</th>
                <th class="px-6 py-4 text-left font-semibold">Name</th>
                <th class="px-6 py-4 text-left font-semibold">Email</th>
              </tr>
            </thead>
            <tbody id="employees-body" class="divide-y divide-outline/20">
            </tbody>
          </table>
        </div>
      </div>

      <div class="glass-premium rounded-2xl flex flex-col overflow-hidden card-hover">
        <div class="p-6 border-b border-outline/30 flex justify-between items-center bg-white/30">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">history</span>
            <h3 class="text-lg font-semibold">All Attendances</h3>
          </div>
        </div>
        <div class="overflow-x-auto max-h-[400px]">
          <table class="min-w-full text-sm">
            <thead class="bg-surface/20 text-on-surface-variant/80 border-b border-outline/20">
              <tr>
                <th class="px-6 py-4 text-left font-semibold tracking-wider">Date</th>
                <th class="px-6 py-4 text-left font-semibold">Employee</th>
                <th class="px-6 py-4 text-center font-semibold">Check-in</th>
                <th class="px-6 py-4 text-center font-semibold">Check-out</th>
              </tr>
            </thead>
            <tbody id="attendance-body" class="divide-y divide-outline/20">
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="glass-premium rounded-2xl overflow-hidden card-hover">
      <div class="p-7 border-b border-outline/30 bg-white/20 flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">summarize</span>
        <h3 class="text-lg font-semibold">Recent Reports</h3>
      </div>
      <div id="reportsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-7">
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    if(checkAuth('ROLE_ADMIN')) {
        loadData();
        pollActivity();
        setInterval(pollActivity, 10000); // Poll every 10 seconds
    }

    function showToast(message, isError = false) {
        const toastDiv = document.createElement('div');
        toastDiv.className = `fixed top-20 right-6 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-medium backdrop-blur-md transition-all duration-300 transform translate-x-0 ${isError ? 'bg-red-500/90 text-white' : 'bg-primary/90 text-white'} flex items-center gap-3`;
        toastDiv.style.animation = 'slideInRight 0.3s ease-out forwards';
        toastDiv.innerHTML = `<span class="material-symbols-outlined text-[20px]">${isError ? 'error' : 'info'}</span>${message}`;
        document.body.appendChild(toastDiv);
        setTimeout(() => { 
            toastDiv.style.opacity = '0'; 
            toastDiv.style.transform = 'translateY(-10px)';
            setTimeout(() => toastDiv.remove(), 300); 
        }, 5000);
    }

    const notifBtn = document.getElementById('notifBtn');
    const notifDropdown = document.getElementById('notifDropdown');
    const notifBadge = document.getElementById('notifBadge');

    notifBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        notifDropdown.classList.toggle('hidden');
        notifDropdown.classList.toggle('flex');
        if(!notifDropdown.classList.contains('hidden')) {
            notifBadge.classList.add('hidden'); // Clear badge when opened
        }
    });

    document.addEventListener('click', (e) => {
        if (!notifDropdown.contains(e.target) && !notifBtn.contains(e.target)) {
            notifDropdown.classList.add('hidden');
            notifDropdown.classList.remove('flex');
        }
    });

    let lastActivityId = null;
    async function pollActivity() {
        try {
            const res = await fetch('/api/admin/notifications', { headers: getAuthHeader() });
            if (res.ok) {
                const activities = await res.json();
                const feed = document.getElementById('activityFeed');
                if (activities.length === 0) {
                    feed.innerHTML = `
                       <div class="text-center text-xs text-on-surface-variant/70 italic py-8 flex flex-col items-center gap-2">
                         <span class="material-symbols-outlined text-4xl text-outline/50">notifications_off</span>
                         No new notifications
                       </div>`;
                    return;
                }
                
                if (lastActivityId && activities.length > 0 && activities[0].id !== lastActivityId) {
                    for (const act of activities) {
                        if (act.id === lastActivityId) break;
                        showToast(`New Activity: ${act.message}`, false);
                    }
                    if (notifDropdown.classList.contains('hidden')) {
                        notifBadge.classList.remove('hidden');
                    }
                    loadData(); // Refresh tables when there's new activity
                }
                if (activities.length > 0) lastActivityId = activities[0].id;

                feed.innerHTML = activities.map(a => {
                    let icon = 'notifications';
                    let color = 'text-primary';
                    let bg = 'bg-primary/10';
                    if (a.type === 'CHECK_IN') { icon = 'login'; color = 'text-secondary'; bg = 'bg-secondary/10'; }
                    if (a.type === 'CHECK_OUT') { icon = 'logout'; color = 'text-tertiary'; bg = 'bg-tertiary/10'; }
                    if (a.type === 'REPORT') { icon = 'summarize'; color = 'text-blue-600'; bg = 'bg-blue-100'; }
                    
                    const time = new Date(a.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
                    
                    return `
                    <div class="flex items-start gap-3 p-3 rounded-lg hover:bg-surface/80 transition-colors cursor-pointer border border-transparent hover:border-outline/20">
                        <div class="p-2 rounded-full ${bg} ${color} flex-shrink-0">
                            <span class="material-symbols-outlined text-[18px]">${icon}</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-medium text-on-surface leading-snug">${a.message}</p>
                            <p class="text-[10px] text-on-surface-variant mt-1">${time}</p>
                        </div>
                    </div>
                    `;
                }).join('');
            }
        } catch (err) { console.error(err); }
    }

    async function loadData() {
      try {
        let res = await fetch('/api/admin/employees', { headers: getAuthHeader() });
        if (res.status === 401 || res.status === 403) { logout(); return; }
        if(res.ok) {
          const emps = await res.json();
          const tbody = document.getElementById('employees-body');
          if (emps.length === 0) {
              tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-on-surface-variant/70 italic">No employees found.</td></tr>`;
          } else {
              tbody.innerHTML = emps.map(emp => `
                <tr class="hover:bg-primary/5 transition group">
                  <td class="px-6 py-4 text-on-surface-variant">${emp.id}</td>
                  <td class="px-6 py-4 font-semibold text-on-surface">${emp.name}</td>
                  <td class="px-6 py-4 text-on-surface-variant">${emp.email || emp.username || 'N/A'}</td>
                </tr>
              `).join('');
          }
        }

        res = await fetch('/api/admin/reports', { headers: getAuthHeader() });
        if(res.ok) {
          const reports = await res.json();
          const container = document.getElementById('reportsGrid');
          if (reports.length === 0) {
              container.innerHTML = `<div class="col-span-full py-10 text-center text-on-surface-variant/70 italic">No recent reports.</div>`;
          } else {
              container.innerHTML = reports.map(r => `
                <div class="bg-white/60 backdrop-blur-sm border border-outline/30 p-6 rounded-2xl hover:shadow-md transition-all hover:border-primary/30 group">
                  <div class="flex justify-between items-start mb-3">
                    <span class="text-[11px] font-bold tracking-wider text-primary/70">${r.date}</span>
                    <span class="text-[11px] font-bold tracking-wider bg-primary/10 text-primary px-2 py-1 rounded-full">${r.user?.name || 'N/A'}</span>
                  </div>
                  <p class="text-sm leading-relaxed text-on-surface/80 line-clamp-3" style="white-space: pre-wrap;">${r.taskDescription}</p>
                </div>
              `).join('');
          }
        }

        res = await fetch('/api/admin/attendance', { headers: getAuthHeader() });
        if(res.ok) {
          const atts = await res.json();
          const tbody = document.getElementById('attendance-body');
          if (atts.length === 0) {
              tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-on-surface-variant/70 italic">No attendance records found.</td></tr>`;
          } else {
              tbody.innerHTML = atts.map(a => `
                <tr class="hover:bg-primary/5 transition group">
                  <td class="px-6 py-4 font-semibold text-on-surface">${a.date}</td>
                  <td class="px-6 py-4 text-on-surface-variant">${a.user?.name || 'N/A'}</td>
                  <td class="px-6 py-4 text-center text-on-surface-variant">${a.checkInTime ? new Date(a.checkInTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }) : '-'}</td>
                  <td class="px-6 py-4 text-center text-on-surface-variant">${a.checkOutTime ? new Date(a.checkOutTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }) : '-'}</td>
                </tr>
              `).join('');
          }
        }
      } catch (err) { console.error(err); }
    }
  </script>
</body>
</html>
