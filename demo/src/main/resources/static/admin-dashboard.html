<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Employee Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">Admin Dashboard</div>
            <div>
                Welcome, <span id="username-display" style="font-weight: 600; margin-right: 1rem;"></span>
                <button onclick="logout()" class="btn btn-danger" style="width: auto; padding: 0.5rem 1rem;">Logout</button>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="glass-card">
                <h2>All Employees</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Username</th>
                            </tr>
                        </thead>
                        <tbody id="employees-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass-card">
                <h2>Recent Reports</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Employee</th>
                                <th>Task Description</th>
                            </tr>
                        </thead>
                        <tbody id="reports-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="glass-card" style="margin-top: 2rem;">
            <h2>All Attendances</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Employee</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Total Hours</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Guard route
        if(checkAuth('ROLE_ADMIN')) {
            loadData();
        }

        async function loadData() {
            try {
                // Fetch Employees
                let res = await fetch('/api/admin/employees', { headers: getAuthHeader() });
                if(res.ok) {
                    const emps = await res.json();
                    const tbody = document.getElementById('employees-body');
                    tbody.innerHTML = '';
                    emps.forEach(emp => {
                        tbody.innerHTML += `<tr><td>${emp.id}</td><td>${emp.name}</td><td>${emp.username}</td></tr>`;
                    });
                }

                // Fetch Reports
                res = await fetch('/api/admin/reports', { headers: getAuthHeader() });
                if(res.ok) {
                    const reports = await res.json();
                    const tbody = document.getElementById('reports-body');
                    tbody.innerHTML = '';
                    reports.forEach(r => {
                        tbody.innerHTML += `<tr><td>${r.date}</td><td>${r.user?.name || 'N/A'}</td><td>${r.taskDescription}</td></tr>`;
                    });
                }

                // Fetch Attendance
                res = await fetch('/api/admin/attendance', { headers: getAuthHeader() });
                if(res.ok) {
                    const atts = await res.json();
                    const tbody = document.getElementById('attendance-body');
                    tbody.innerHTML = '';
                    atts.forEach(a => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${a.date}</td>
                                <td>${a.user?.name || 'N/A'}</td>
                                <td>${a.checkInTime ? new Date(a.checkInTime).toLocaleTimeString() : '-'}</td>
                                <td>${a.checkOutTime ? new Date(a.checkOutTime).toLocaleTimeString() : '-'}</td>
                                <td>${a.totalHours ? a.totalHours : '-'}</td>
                            </tr>
                        `;
                    });
                }

            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
